<section class="hero">
    <div class="hero-container animate-up">
        <h1> Mudanças<br>Nacionais e<br> Internacionais</h1>
        <h3>Soluções completas para mudanças residenciais e empresariais.</h3>
    </div>

    <div class="hero-form-container animate-right delay">
        <h3>Pensando em mudar?</h3>
        <h4>Obtenha uma cotação gratuita conosco.</h4>

        <form id="contactForm" class="hero-form">

                <label>Nome</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Nome" required>
                </div>

                <label>Email</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>

                <label>Origem</label>
                <div class="input-icon">
                    <i class="fas fa-location-dot"></i>
                    <input type="text" placeholder="Origem" required>
                </div>

                <label>Destino</label>
                <div class="input-icon">
                    <i class="fas fa-flag-checkered"></i>
                    <input type="text" placeholder="Destino" required>
                </div>

                <button class="btn" type="submit">
                    Solicitar Cotação
                </button>

        </form>
    </div>
</section>
