<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotação | Move and Shipping</title>

    <link rel="stylesheet" href="../../assets/css/global/base.css">
    <link rel="stylesheet" href="../../assets/css/componentes/header.css">
    <link rel="stylesheet" href="../../assets/css/componentes/footer.css">
    <link rel="stylesheet" href="../../assets/css/cotacao/cotacao.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body id="top">
    <div id="header-container"></div>

    <main>
        <section class="page-hero cotacao-hero">
            <div class="page-hero-content">
                <span>Solicite uma proposta</span>
                <h1>Cotação</h1>
                <p>Preencha os dados abaixo e nossa equipe entrará em contato.</p>
            </div>
        </section>

        <section class="cotacao-page">
            <div class="page-container">
                <form class="cotacao-page-form">
                    <div class="form-grid">
                        <input type="text" placeholder="Nome completo" required>
                        <input type="email" placeholder="E-mail" required>
                        <input type="tel" placeholder="Telefone" required>
                        <input type="text" placeholder="Cidade de origem" required>
                        <input type="text" placeholder="Cidade de destino" required>
                        <select required>
                            <option value="" disabled selected>Tipo de serviço</option>
                            <option value="nacional">Mudança Nacional</option>
                            <option value="internacional">Mudança Internacional</option>
                            <option value="comercial">Mudança Comercial</option>
                            <option value="armazenagem">Armazenagem</option>
                        </select>
                        <textarea placeholder="Conte um pouco sobre sua mudança" rows="5"></textarea>
                    </div>

                    <button type="submit" class="btn">Enviar Cotação</button>
                </form>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="../../assets/js/componentes.js"></script>
</body>

</html>
