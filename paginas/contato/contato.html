<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Move and Shipping</title>

    <link rel="stylesheet" href="../../assets/css/global/base.css">
    <link rel="stylesheet" href="../../assets/css/componentes/header.css">
    <link rel="stylesheet" href="../../assets/css/componentes/footer.css">
    <link rel="stylesheet" href="../../assets/css/contato/contato.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body id="top">
    <div id="header-container"></div>

    <main>
        <section class="page-hero contato-hero">
            <div class="page-hero-content">
                <span>Fale conosco</span>
                <h1>Contato</h1>
                <p>Estamos prontos para ajudar no planejamento da sua mudança.</p>
            </div>
        </section>

        <section class="contato-page">
            <div class="page-container contato-grid">
                <div class="contato-info">
                    <h2>Entre em contato</h2>
                    <p><i class="fa-solid fa-phone"></i> América do Sul: 0800-252 5663</p>
                    <p><i class="fa-solid fa-phone"></i> América do Norte: 1-800-252-5663</p>
                    <p><i class="fa-solid fa-at"></i> info@moveandshipping.com</p>
                </div>

                <form class="contato-form">
                    <input type="text" placeholder="Nome completo" required>
                    <input type="email" placeholder="E-mail" required>
                    <input type="tel" placeholder="Telefone">
                    <textarea placeholder="Mensagem" rows="5"></textarea>
                    <button type="submit" class="btn">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="../../assets/js/componentes.js"></script>
</body>

</html>
